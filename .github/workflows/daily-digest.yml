name: Generate Daily Digest

on:
  schedule:
    # Daily at 02:00 UTC (09:00 ICT)
    - cron: '0 2 * * *'
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate digest
        run: node generate.js

      - name: Copy digest to docs/
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "output/digest-${TODAY}.md" ]; then
            cp "output/digest-${TODAY}.md" docs/digest-latest.md
          else
            echo "⚠️ No digest generated for ${TODAY}"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ docs/digest-latest.md
          git diff --cached --quiet || git commit -m "chore: generate digest $(date +%Y-%m-%d)"
          git push
